name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  checks:
    name: Type check, build
    runs-on: ubuntu-latest

    # Placeholder env vars so the Supabase client can instantiate during build.
    # These are not real credentials — the bundle never actually calls Supabase
    # in CI, it just needs the variables to be defined at build time.
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder-anon-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      # - name: Lint
      #   run: npm run lint

      - name: Build
        run: npm run build
